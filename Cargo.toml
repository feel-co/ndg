[workspace]
members  = [ "ndg" ]
resolver = "3"

[workspace.package]
authors      = [ "NotAShelf <raf@notashelf.dev>" ]
categories   = [ "text-processing" ]
description  = "Generate HTML documents and manpages for your Nix projects"
edition      = "2024"
keywords     = [ "markdown", "commonmark", "nix", "nixpkgs", "documentation", "html", "manpage", "nix-docs" ]
license      = "MPL-2.0"
readme       = true
repository   = "https://github.com/notashelf/ndg"
rust-version = "1.85"
version      = "0.4.0"


[workspace.dependencies]
anyhow = "1.0"
chrono = { version = "0.4.40", default-features = false, features = [ "std", "clock" ] }
clap = { version = "4.5", default-features = false, features = [
  "std",
  "derive",
  "help",
  "usage",
  "suggestions",
] }
clap_complete = "4.5"
clap_mangen = "0.2"
env_logger = "0.11"
fs_extra = "1.3"
grass = { version = "0.13", default-features = false, features = [  ] }
log = "0.4"
num_cpus = "1.16"
pulldown-cmark = { version = "0.11", default-features = false, features = [ "html" ] }
rayon = "1.10"
regex = "1.11.1"
serde = { version = "1.0", features = [ "derive" ] }
serde_json = { version = "1.0", default-features = false, features = [ "preserve_order" ] }
syntect = "5.2"
tera = { version = "1.20", default-features = false }
toml = { version = "0.8", default-features = false, features = [ "parse" ] }
two-face = "0.4"
walkdir = "2.5"

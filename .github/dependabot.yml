version: 2
updates:
  # Update Cargo deps
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  # Update used workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7

  # Update Nixpkgs
  - package-ecosystem: nix
    directory: "/"
    schedule:
      interval: "monthly"

name: Publish Crates

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Tag and Release"]
    types:
      - completed

jobs:
  publish:
    name: Publish ndg-commonmark
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and index
        uses: Swatinem/rust-cache@v2

      - name: Publish ndg-commonmark
        run: |
          if [ -z "${{ secrets.CARGO_REGISTRY_SECRET }}" ]; then
            echo "CARGO_REGISTRY_SECRET is not set. Skipping publish."
            exit 0
          fi

          OUTPUT=$(cargo publish -p ndg-commonmark \
            --no-verify --locked --token ${{ secrets.CARGO_REGISTRY_SECRET }} 2>&1) && echo "$OUTPUT" || {
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "Version already published on crates.io, skipping."
              exit 0
            fi
            echo "$OUTPUT" >&2
            exit 1
          }

      - name: Wait for ndg-commonmark to be available
        run: |
          for i in {1..10}; do
            sleep 3
            cargo search ndg-commonmark | grep -q ndg-commonmark && break
          done
